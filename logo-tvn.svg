<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60">
  <!-- TVN - Logo simplificado con mejor contraste -->
  <defs>
    <linearGradient id="tvnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004A99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo con gradiente azul -->
  <rect width="120" height="60" fill="url(#tvnGradient)" rx="6"/>
  
  <!-- TVN en blanco -->
  <g fill="white">
    <!-- T -->
    <rect x="10" y="15" width="20" height="4"/>
    <rect x="17" y="15" width="4" height="30"/>
    
    <!-- V -->
    <polygon points="35,15 42,40 46,40 53,15 49,15 44,34 39,15"/>
    
    <!-- N -->
    <rect x="57" y="15" width="4" height="30"/>
    <polygon points="61,15 75,38 75,15 79,15 79,45 75,45 61,22 61,45 57,45 57,15"/>
  </g>
  
  <!-- Línea roja característica en la parte inferior -->
  <rect x="10" y="50" width="100" height="3" fill="#E31B23"/>
</svg>
