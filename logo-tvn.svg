<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Fondo blanco -->
  <rect width="200" height="80" fill="white" rx="8"/>
  
  <!-- TVN en azul corporativo -->
  <g fill="#0066CC">
    <!-- T -->
    <rect x="20" y="20" width="40" height="8"/>
    <rect x="36" y="20" width="8" height="40"/>
    
    <!-- V -->
    <polygon points="70,20 82,60 88,60 100,20 92,20 85,48 78,20"/>
    
    <!-- N -->
    <rect x="110" y="20" width="8" height="40"/>
    <polygon points="118,20 142,52 142,20 150,20 150,60 142,60 118,28 118,60 110,60 110,20"/>
  </g>
  
  <!-- Línea roja característica -->
  <rect x="20" y="65" width="160" height="4" fill="#E31B23"/>
</svg>
